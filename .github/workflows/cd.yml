name: CD

on:
  push:
    branches: [main]

jobs:
  docker-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/budget:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/budget:sha-${{ steps.sha.outputs.short }}

  deploy:
    needs: docker-push
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          curl --fail-with-body -sS -X POST "$DEPLOY_URL" \
            -H "Authorization: Bearer $DEPLOY_SECRET" \
            -H "Content-Type: application/json" \
            -w '\n---\nstatus: %{http_code}, duration: %{time_total}s\n' \
            --data "{\"sha\":\"${GITHUB_SHA}\",\"repo\":\"${GITHUB_REPOSITORY}\"}"
